# This workflow is managed by gh actions-lock.
# This workflow lints specific file types using dedicated linters:
# - actionlint for GitHub Actions workflows
# - ESLint for JavaScript/TypeScript files
# - markdownlint for Markdown files
# - yamllint for YAML files
#
# Note: Prettier is run separately in the CI workflow
name: Lint Codebase

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  eslint:
    name: Lint JavaScript/TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci --legacy-peer-deps

      - name: Lint
        id: npm-lint
        run: npm run lint

  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.3

      - name: Run actionlint
        id: actionlint
        uses: raven-actions/actionlint@v2.1.2
        with:
          matcher: true

